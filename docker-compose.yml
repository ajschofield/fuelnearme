services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fuelnearme
      POSTGRES_USER: fuelnearme
      POSTGRES_PASSWORD: fuelnearme
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelnearme"]
      interval: 5s
      timeout: 5s
      retries: 5

  extract:
    build:
      context: .
      dockerfile: extract/Dockerfile
    volumes:
      - pipeline_data:/data
    environment:
      OUTPUT_DIR: /data
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}

  load:
    build:
      context: .
      dockerfile: load/Dockerfile
    volumes:
      - pipeline_data:/data
    environment:
      INPUT_DIR: /data
      DATABASE_URL: postgresql://fuelnearme:fuelnearme@postgres:5432/fuelnearme
    depends_on:
      postgres:
        condition: service_healthy
      extract:
        condition: service_completed_successfully

  transform:
    build:
      context: .
      dockerfile: transform/Dockerfile
    environment:
      DBT_HOST: postgres
      DBT_PORT: "5432"
      DBT_USER: fuelnearme
      DBT_PASSWORD: fuelnearme
      DBT_DBNAME: fuelnearme
    depends_on:
      postgres:
        condition: service_healthy
      load:
        condition: service_completed_successfully

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://fuelnearme:fuelnearme@postgres:5432/fuelnearme
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  pipeline_data:
