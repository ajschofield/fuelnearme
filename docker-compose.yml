services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fuelnearme
      POSTGRES_USER: fuelnearme
      POSTGRES_PASSWORD: fuelnearme
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelnearme"]
      interval: 5s
      timeout: 5s
      retries: 5

  extract:
    build:
      context: .
      dockerfile: extract/Dockerfile
    volumes:
      - pipeline_data:/data
    environment:
      OUTPUT_DIR: /data

  load:
    build:
      context: .
      dockerfile: load/Dockerfile
    volumes:
      - pipeline_data:/data
    environment:
      INPUT_DIR: /data
      DATABASE_URL: postgresql://fuelnearme:fuelnearme@postgres:5432/fuelnearme
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  pipeline_data:
