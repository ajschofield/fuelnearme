services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fuelnearme
      POSTGRES_USER: fuelnearme
      POSTGRES_PASSWORD: fuelnearme
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelnearme"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
