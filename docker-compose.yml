# Common Airflow config shared by the scheduler, webserver, init and every
# worker. CeleryExecutor routes each task to the worker subscribed to its queue.
x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
  AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
  AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-db/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-REMOVED}
  AIRFLOW__WEBSERVER__SECRET_KEY: fuelnearme-dev-secret

# Shared healthcheck cadence; each service overrides `test`.
x-healthcheck: &healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

# Celery workers all share the same liveness probe (ping their own node).
x-worker-healthcheck: &worker-healthcheck
  <<: *healthcheck
  test:
    - CMD-SHELL
    - celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$$(hostname)" || exit 1

# Rotate container logs so they never grow unbounded on the host.
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# DB connection strings the worker stages use to reach the fuel database.
x-fuel-db-env: &fuel-db-env
  DATABASE_URL: postgresql://fuelnearme:fuelnearme@postgres:5432/fuelnearme
  DBT_HOST: postgres
  DBT_PORT: "5432"
  DBT_USER: fuelnearme
  DBT_PASSWORD: fuelnearme
  DBT_DBNAME: fuelnearme

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fuelnearme
      POSTGRES_USER: fuelnearme
      POSTGRES_PASSWORD: fuelnearme
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelnearme"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512m

  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 256m

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128m

  airflow-init:
    image: apache/airflow:2.10.4
    environment:
      <<: *airflow-env
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@fuelnearme.local || true
    depends_on:
      airflow-db:
        condition: service_healthy
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512m

  airflow-scheduler:
    image: apache/airflow:2.10.4
    command: scheduler
    environment:
      <<: *airflow-env
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 768m
    restart: unless-stopped

  airflow-webserver:
    image: apache/airflow:2.10.4
    command: webserver
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
      # Airflow defaults to 4 gunicorn workers (each a heavy process); 2 is
      # plenty for a single-user stack and avoids OOM-thrashing on modest hosts.
      AIRFLOW__WEBSERVER__WORKERS: "2"
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  airflow-worker-extract:
    build:
      context: .
      dockerfile: extract/Dockerfile
    # concurrency=1 keeps the memory footprint low so the stack runs on modest
    # / restricted hosts; the linear pipeline needs no per-stage parallelism.
    command: celery worker --queues extract --concurrency 1
    environment:
      <<: *airflow-env
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
    volumes:
      - ./dags:/opt/airflow/dags
      - pipeline_data:/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 768m
    restart: unless-stopped

  airflow-worker-load:
    build:
      context: .
      dockerfile: load/Dockerfile
    command: celery worker --queues load --concurrency 1
    environment:
      <<: [*airflow-env, *fuel-db-env]
    volumes:
      - ./dags:/opt/airflow/dags
      - pipeline_data:/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 768m
    restart: unless-stopped

  airflow-worker-transform:
    build:
      context: .
      dockerfile: transform/Dockerfile
    command: celery worker --queues transform --concurrency 1
    environment:
      <<: [*airflow-env, *fuel-db-env]
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 768m
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://fuelnearme:fuelnearme@postgres:5432/fuelnearme
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health').getcode()==200 else 1)"
      start_period: 30s
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

volumes:
  pg_data:
  airflow_db:
  pipeline_data:
