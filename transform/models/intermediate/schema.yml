version: 2

models:
  - name: int_prices_with_station
    columns:
      - name: node_id
        tests:
          - not_null
      - name: fuel_type
        tests:
          - not_null
      - name: price_pence
        tests:
          - not_null
      - name: latitude
        tests:
          - not_null
      - name: longitude
        tests:
          - not_null

unit_tests:
  - name: test_station_fields_joined_onto_price_row
    model: int_prices_with_station
    given:
      - input: ref('stg_fuel_prices')
        rows:
          - node_id: "abc123"
            trading_name: "Test Station"
            fuel_type: "E5"
            price_pence: 159.9
            price_last_updated: "2026-02-17T16:03:04.938Z"
            price_change_effective_timestamp: "2026-02-17T16:00:00.000Z"
            loaded_at: "2026-06-01 00:00:00+00"
      - input: ref('stg_stations')
        rows:
          - node_id: "abc123"
            public_phone_number: null
            trading_name: "Test Station"
            brand_name: "Test Brand"
            is_same_trading_and_brand_name: true
            temporary_closure: false
            permanent_closure: false
            permanent_closure_date: null
            is_motorway_service_station: false
            is_supermarket_service_station: false
            address_line_1: "1 Test St"
            address_line_2: null
            city: "Leeds"
            county: "West Yorkshire"
            country: "England"
            postcode: "LS1 1AA"
            latitude: 53.7997
            longitude: -1.5492
            amenities: '["car_wash"]'
            opening_times: '{}'
            fuel_types: '["E5"]'
            loaded_at: "2026-06-01 00:00:00+00"
    expect:
      rows:
        - node_id: "abc123"
          fuel_type: "E5"
          price_pence: 159.9
          postcode: "LS1 1AA"
          latitude: 53.7997
          longitude: -1.5492

  - name: test_price_row_kept_when_no_matching_station
    model: int_prices_with_station
    given:
      - input: ref('stg_fuel_prices')
        rows:
          - node_id: "abc123"
            trading_name: "Unknown Station"
            fuel_type: "E5"
            price_pence: 159.9
            price_last_updated: "2026-02-17T16:03:04.938Z"
            price_change_effective_timestamp: "2026-02-17T16:00:00.000Z"
            loaded_at: "2026-06-01 00:00:00+00"
      - input: ref('stg_stations')
        rows: []
    expect:
      rows:
        - node_id: "abc123"
          fuel_type: "E5"
          latitude: null
          longitude: null
